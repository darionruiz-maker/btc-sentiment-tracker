<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Sentiment Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #1e2a3f; }
        header h1 { font-size: 24px; color: #f7931a; margin-bottom: 4px; }
        header p { font-size: 13px; color: #7a8aa0; }

        .price-bar {
            display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap;
            margin-bottom: 20px; padding: 16px; background: #131a2b; border-radius: 12px; border: 1px solid #1e2a3f;
        }
        .price-main { font-size: 36px; font-weight: 800; color: #fff; }
        .price-change { font-size: 16px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }
        .price-change.up { color: #00e676; background: rgba(0,230,118,0.1); }
        .price-change.down { color: #ff5252; background: rgba(255,82,82,0.1); }

        .timeframe-toggle { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tf-btn {
            padding: 8px 16px; border: 1px solid #1e2a3f; background: transparent; color: #7a8aa0;
            border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s;
        }
        .tf-btn:hover { border-color: #03b5ff; color: #03b5ff; }
        .tf-btn.active { background: #03b5ff; color: #000; border-color: #03b5ff; }

        /* ACTION BOX — the hero */
        .action-box {
            text-align: center; margin-bottom: 24px; padding: 28px 24px;
            border-radius: 16px; border: 2px solid;
        }
        .action-box.buy { background: rgba(0,230,118,0.05); border-color: #00e676; }
        .action-box.sell { background: rgba(255,82,82,0.05); border-color: #ff5252; }
        .action-box.hold { background: rgba(255,215,64,0.05); border-color: #ffd740; }
        .action-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #7a8aa0; margin-bottom: 8px; }
        .action-signal { font-size: 56px; font-weight: 900; letter-spacing: 2px; }
        .action-box.buy .action-signal { color: #00e676; }
        .action-box.sell .action-signal { color: #ff5252; }
        .action-box.hold .action-signal { color: #ffd740; }
        .action-confidence { font-size: 14px; margin-top: 8px; color: #7a8aa0; }
        .action-confidence strong { color: #fff; }
        .action-reasons { margin-top: 14px; text-align: left; display: inline-block; max-width: 500px; }
        .action-reasons li { font-size: 13px; color: #b0bec5; margin-bottom: 4px; list-style: none; padding-left: 18px; position: relative; }
        .action-reasons li::before { content: ''; position: absolute; left: 0; top: 6px; width: 8px; height: 8px; border-radius: 50%; }
        .action-box.buy .action-reasons li::before { background: #00e676; }
        .action-box.sell .action-reasons li::before { background: #ff5252; }
        .action-box.hold .action-reasons li::before { background: #ffd740; }

        /* Score bar */
        .score-bar { margin-bottom: 24px; padding: 16px 20px; background: #131a2b; border-radius: 12px; border: 1px solid #1e2a3f; }
        .score-bar-label { font-size: 11px; color: #7a8aa0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .score-track { position: relative; height: 12px; background: linear-gradient(to right, #ff5252, #ff8a65, #ffd740, #66ffa6, #00e676); border-radius: 6px; opacity: 0.4; }
        .score-needle { position: absolute; top: -4px; width: 6px; height: 20px; background: #fff; border-radius: 3px; box-shadow: 0 0 10px rgba(255,255,255,0.8); transition: left 0.5s; }
        .score-labels { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-top: 4px; }
        .score-value { text-align: center; font-size: 28px; font-weight: 800; margin-top: 8px; }

        .section {
            background: #131a2b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #1e2a3f;
        }
        .section h3 { font-size: 12px; color: #7a8aa0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .section h3 .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        .badge-bull { background: rgba(0,230,118,0.15); color: #00e676; }
        .badge-bear { background: rgba(255,82,82,0.15); color: #ff5252; }
        .badge-neutral { background: rgba(255,215,64,0.15); color: #ffd740; }

        canvas.chart { width: 100%; height: 140px; display: block; }
        canvas.chart-sm { width: 100%; height: 100px; display: block; }

        .rsi-value-big { font-size: 42px; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .rsi-status { font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 14px; }
        .rsi-bar { position: relative; height: 28px; background: linear-gradient(to right, #00e676 0%, #00e676 30%, #ffd740 30%, #ffd740 70%, #ff5252 70%, #ff5252 100%); border-radius: 6px; margin-bottom: 4px; opacity: 0.25; }
        .rsi-needle { position: absolute; top: -3px; width: 4px; height: 34px; background: #fff; border-radius: 2px; box-shadow: 0 0 8px rgba(255,255,255,0.8); transition: left 0.4s; }
        .rsi-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: #555; margin-bottom: 12px; }

        .mtf-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .mtf-card { background: #0a0e1a; border-radius: 8px; padding: 12px; text-align: center; border: 1px solid #1e2a3f; }
        .mtf-card .tf-label { font-size: 11px; color: #7a8aa0; margin-bottom: 4px; }
        .mtf-card .tf-trend { font-size: 18px; font-weight: 700; }

        .indicators-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .indicator-card { background: #131a2b; border-radius: 10px; padding: 14px; border: 1px solid #1e2a3f; display: flex; align-items: center; gap: 12px; }
        .indicator-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .indicator-dot.bullish { background: #00e676; box-shadow: 0 0 8px rgba(0,230,118,0.5); }
        .indicator-dot.bearish { background: #ff5252; box-shadow: 0 0 8px rgba(255,82,82,0.5); }
        .indicator-dot.neutral { background: #ffd740; box-shadow: 0 0 8px rgba(255,215,64,0.5); }
        .indicator-info { flex: 1; }
        .indicator-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 2px; }
        .indicator-desc { font-size: 11px; color: #7a8aa0; }
        .indicator-explain { font-size: 10px; color: #556; margin-top: 3px; font-style: italic; line-height: 1.3; }
        .indicator-val { font-size: 15px; font-weight: 700; text-align: right; }
        .indicator-val.bullish { color: #00e676; }
        .indicator-val.bearish { color: #ff5252; }
        .indicator-val.neutral { color: #ffd740; }

        .sr-levels { display: flex; gap: 10px; flex-wrap: wrap; }
        .sr-level { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .sr-resistance { background: rgba(255,82,82,0.1); color: #ff5252; border: 1px solid rgba(255,82,82,0.3); }
        .sr-support { background: rgba(0,230,118,0.1); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }
        .sr-current { background: rgba(3,181,255,0.1); color: #03b5ff; border: 1px solid rgba(3,181,255,0.3); }

        .agreement-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .agreement-bar .bull { background: #00e676; }
        .agreement-bar .neut { background: #ffd740; }
        .agreement-bar .bear { background: #ff5252; }
        .agreement-legend { display: flex; justify-content: space-between; font-size: 11px; color: #7a8aa0; }

        .bb-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
        .bb-stat { text-align: center; }
        .bb-stat .val { font-size: 16px; font-weight: 700; color: #fff; }
        .bb-stat .lbl { font-size: 10px; color: #7a8aa0; margin-top: 2px; }

        /* Risk/Reward */
        .rr-bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; margin: 8px 0; }
        .rr-bar .rr-risk { background: rgba(255,82,82,0.3); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #ff5252; font-weight: 600; }
        .rr-bar .rr-reward { background: rgba(0,230,118,0.3); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #00e676; font-weight: 600; }
        .rr-labels { display: flex; justify-content: space-between; font-size: 11px; color: #7a8aa0; }

        /* Divergence alert */
        .divergence-alert {
            padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
        }
        .divergence-alert.bullish-div { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.3); color: #00e676; }
        .divergence-alert.bearish-div { background: rgba(255,82,82,0.08); border: 1px solid rgba(255,82,82,0.3); color: #ff5252; }
        .divergence-alert .div-icon { font-size: 20px; }

        /* Reversal Radar */
        .reversal-section { background: #0d1520; border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 2px solid #1e2a3f; }
        .reversal-section.hot { border-color: #00e676; box-shadow: 0 0 20px rgba(0,230,118,0.1); }
        .reversal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .reversal-header h3 { font-size: 14px; color: #7a8aa0; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .reversal-prob { font-size: 36px; font-weight: 800; text-align: center; margin-bottom: 4px; }
        .reversal-label { text-align: center; font-size: 13px; margin-bottom: 16px; }
        .reversal-bar { height: 10px; background: #1e2a3f; border-radius: 5px; overflow: hidden; margin-bottom: 16px; }
        .reversal-bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s; }
        .reversal-signals { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        @media (max-width: 600px) { .reversal-signals { grid-template-columns: 1fr; } }
        .rev-signal { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 8px; background: #131a2b; border: 1px solid #1e2a3f; }
        .rev-signal.active { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.03); }
        .rev-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
        .rev-dot.on { background: #00e676; box-shadow: 0 0 8px rgba(0,230,118,0.6); }
        .rev-dot.off { background: #333; }
        .rev-info { flex: 1; }
        .rev-name { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .rev-desc { font-size: 11px; color: #7a8aa0; line-height: 1.3; }

        /* Time Machine */
        .tm-toggle { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .tm-btn { padding: 8px 16px; border: 1px solid #6c3baa; background: rgba(108,59,170,0.1); color: #b388ff; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .tm-btn:hover { background: rgba(108,59,170,0.2); }
        .tm-btn.active { background: #6c3baa; color: #fff; border-color: #9c4dff; box-shadow: 0 0 12px rgba(156,77,255,0.3); }
        .tm-banner { background: rgba(108,59,170,0.1); border: 1px solid #6c3baa; border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; text-align: center; }
        .tm-banner .tm-title { font-size: 14px; font-weight: 700; color: #b388ff; margin-bottom: 4px; }
        .tm-banner .tm-sub { font-size: 12px; color: #7a8aa0; }
        .tm-verdict { border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .tm-verdict.correct { background: rgba(0,230,118,0.05); border: 2px solid #00e676; }
        .tm-verdict.wrong { background: rgba(255,82,82,0.05); border: 2px solid #ff5252; }
        .tm-verdict.partial { background: rgba(255,215,64,0.05); border: 2px solid #ffd740; }
        .tm-verdict-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #7a8aa0; margin-bottom: 6px; }
        .tm-verdict-text { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .tm-verdict.correct .tm-verdict-text { color: #00e676; }
        .tm-verdict.wrong .tm-verdict-text { color: #ff5252; }
        .tm-verdict.partial .tm-verdict-text { color: #ffd740; }
        .tm-verdict-detail { font-size: 13px; color: #b0bec5; line-height: 1.5; }
        .tm-comparison { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-top: 12px; }
        .tm-box { text-align: center; padding: 12px; background: #131a2b; border-radius: 8px; }
        .tm-box .tm-box-label { font-size: 10px; color: #7a8aa0; text-transform: uppercase; margin-bottom: 4px; }
        .tm-box .tm-box-val { font-size: 20px; font-weight: 700; }
        .tm-arrow { font-size: 24px; color: #7a8aa0; }

        /* Whale Watch */
        .whale-section { background: #131a2b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #1e2a3f; }
        .whale-section h3 { font-size: 12px; color: #7a8aa0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .whale-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
        .whale-stat { background: #0a0e1a; border-radius: 8px; padding: 12px; text-align: center; border: 1px solid #1e2a3f; }
        .whale-stat .ws-val { font-size: 20px; font-weight: 800; color: #fff; }
        .whale-stat .ws-label { font-size: 10px; color: #7a8aa0; margin-top: 2px; }
        .whale-list { max-height: 240px; overflow-y: auto; }
        .whale-tx { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
        .whale-tx:nth-child(odd) { background: rgba(255,255,255,0.02); }
        .whale-tx .wt-amount { font-weight: 700; min-width: 100px; }
        .whale-tx .wt-type { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
        .whale-tx .wt-type.dist { background: rgba(255,82,82,0.15); color: #ff5252; }
        .whale-tx .wt-type.consol { background: rgba(0,230,118,0.15); color: #00e676; }
        .whale-tx .wt-type.transfer { background: rgba(3,181,255,0.15); color: #03b5ff; }
        .whale-tx .wt-detail { color: #7a8aa0; flex: 1; }
        .whale-tx .wt-usd { color: #555; font-size: 11px; }
        .whale-explain { font-size: 11px; color: #556; font-style: italic; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2a3f; line-height: 1.4; }

        /* Order Flow */
        .of-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; font-size: 11px; }
        .of-price { width: 70px; text-align: right; color: #7a8aa0; font-size: 10px; }
        .of-bar-wrap { flex: 1; display: flex; height: 14px; }
        .of-bar-bid { background: rgba(0,230,118,0.4); height: 100%; border-radius: 2px 0 0 2px; transition: width 0.3s; }
        .of-bar-ask { background: rgba(255,82,82,0.4); height: 100%; border-radius: 0 2px 2px 0; transition: width 0.3s; }
        .of-vol { width: 60px; font-size: 10px; color: #555; }
        .of-walls { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
        .of-wall { padding: 10px; border-radius: 8px; }
        .of-wall-buy { background: rgba(0,230,118,0.05); border: 1px solid rgba(0,230,118,0.2); }
        .of-wall-sell { background: rgba(255,82,82,0.05); border: 1px solid rgba(255,82,82,0.2); }
        .of-wall h4 { font-size: 11px; color: #7a8aa0; margin-bottom: 6px; }
        .of-wall-item { font-size: 12px; margin-bottom: 3px; }

        /* Institutional */
        .inst-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .inst-table th { text-align: left; color: #7a8aa0; font-size: 10px; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid #1e2a3f; }
        .inst-table td { padding: 6px 8px; border-bottom: 1px solid #0a0e1a; }
        .inst-table tr:hover { background: rgba(255,255,255,0.02); }
        .inst-name { font-weight: 600; color: #fff; }
        .inst-pnl-pos { color: #00e676; font-weight: 600; }
        .inst-pnl-neg { color: #ff5252; font-weight: 600; }

        .actions { text-align: center; margin-top: 20px; }
        .refresh-btn { padding: 10px 24px; background: #1e2a3f; color: #7a8aa0; border: 1px solid #2e3f5f; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .refresh-btn:hover { background: #2e3f5f; color: #fff; }
        .last-updated { text-align: center; font-size: 11px; color: #555; margin-top: 12px; }
        .loading { text-align: center; padding: 40px; color: #7a8aa0; }
        .error-msg { background: rgba(255,82,82,0.1); border: 1px solid #ff5252; border-radius: 8px; padding: 12px; font-size: 13px; color: #ff8a80; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>&#8383; BTC Sentiment Tracker</h1>
        <p>Real-time composite analysis with actionable signals</p>
    </header>
    <div id="app"><div class="loading">Loading market data...</div></div>
</div>
<script>
var API = {
    price: 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true',
    history: function(days){ return 'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=' + days; },
    fearGreed: 'https://api.alternative.me/fng/?limit=1',
    global: 'https://api.coingecko.com/api/v3/global',
    funding: 'https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1',
    treasuries: 'https://api.coingecko.com/api/v3/companies/public_treasury/bitcoin',
    orderbook: 'https://api.kraken.com/0/public/Depth?pair=XBTUSD&count=500',
};

var state = { timeframe:'7', price:null, change24h:0, history:[], volumes:[], rsiSeries:[], currentRSI:null, fearGreed:null, fundingRate:null, btcDominance:null, computed:null, timeMachine:false, tmResult:null, whales:null, treasuries:null, orderflow:null, macro:null };

function fetchJSON(url){ return fetch(url).then(function(r){ if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); }); }

// === TECHNICAL CALCULATIONS ===

function calcRSI(closes, period) {
    if (closes.length < period+1) return null;
    var gains=0, losses=0;
    for (var i=1; i<=period; i++) { var d=closes[i]-closes[i-1]; if(d>0)gains+=d; else losses-=d; }
    var ag=gains/period, al=losses/period;
    for (var i=period+1; i<closes.length; i++) { var d=closes[i]-closes[i-1]; ag=(ag*(period-1)+(d>0?d:0))/period; al=(al*(period-1)+(d<0?-d:0))/period; }
    return al===0?100:100-(100/(1+ag/al));
}

function calcRSISeries(closes, period) {
    if (closes.length < period+1) return [];
    var series=[], gains=0, losses=0;
    for (var i=1; i<=period; i++) { var d=closes[i]-closes[i-1]; if(d>0)gains+=d; else losses-=d; }
    var ag=gains/period, al=losses/period;
    series.push(al===0?100:100-(100/(1+ag/al)));
    for (var i=period+1; i<closes.length; i++) { var d=closes[i]-closes[i-1]; ag=(ag*(period-1)+(d>0?d:0))/period; al=(al*(period-1)+(d<0?-d:0))/period; series.push(al===0?100:100-(100/(1+ag/al))); }
    return series;
}

function calcStochRSI(rsiSeries, period) {
    if (rsiSeries.length < period) return null;
    var s=rsiSeries.slice(-period), mn=Math.min.apply(null,s), mx=Math.max.apply(null,s);
    return mx===mn?50:((rsiSeries[rsiSeries.length-1]-mn)/(mx-mn))*100;
}

function calcEMA(data, period) {
    var k=2/(period+1), ema=[data[0]];
    for (var i=1;i<data.length;i++) ema.push(data[i]*k+ema[i-1]*(1-k));
    return ema;
}

function calcMACD(closes) {
    if (closes.length<26) return null;
    var e12=calcEMA(closes,12), e26=calcEMA(closes,26);
    var ml=e12.map(function(v,i){return v-e26[i];});
    var sig=calcEMA(ml.slice(26),9);
    var m=ml[ml.length-1], s=sig[sig.length-1];
    return {macd:m, signal:s, histogram:m-s};
}

function calcBB(closes, period, mult) {
    if (closes.length<period) return null;
    var s=closes.slice(-period), mean=s.reduce(function(a,b){return a+b;},0)/period;
    var v=s.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/period;
    var std=Math.sqrt(v), upper=mean+mult*std, lower=mean-mult*std, cur=closes[closes.length-1];
    return {upper:upper, lower:lower, mean:mean, percentB:(cur-lower)/(upper-lower), bandwidth:(upper-lower)/mean*100};
}

function calcMA(closes, period) {
    if (closes.length<period) return null;
    var s=closes.slice(-period); return s.reduce(function(a,b){return a+b;},0)/period;
}

function calcATR(closes, period) {
    if (closes.length<period+1) return null;
    var sum=0;
    for (var i=closes.length-period; i<closes.length; i++) sum+=Math.abs(closes[i]-closes[i-1]);
    return sum/period;
}

// RSI Divergence: price making lower lows but RSI making higher lows (bullish) or vice versa
function detectDivergence(closes, rsiSeries) {
    if (rsiSeries.length < 20 || closes.length < 20) return null;
    var len = Math.min(closes.length, rsiSeries.length);
    var offset = closes.length - len;
    // Look at the last third vs the first third of available data
    var seg = Math.floor(len/3);
    var priceFirst = closes.slice(offset, offset+seg);
    var priceLast = closes.slice(-seg);
    var rsiFirst = rsiSeries.slice(0, seg);
    var rsiLast = rsiSeries.slice(-seg);

    var priceMinFirst = Math.min.apply(null, priceFirst);
    var priceMinLast = Math.min.apply(null, priceLast);
    var rsiMinFirst = Math.min.apply(null, rsiFirst);
    var rsiMinLast = Math.min.apply(null, rsiLast);

    var priceMaxFirst = Math.max.apply(null, priceFirst);
    var priceMaxLast = Math.max.apply(null, priceLast);
    var rsiMaxFirst = Math.max.apply(null, rsiFirst);
    var rsiMaxLast = Math.max.apply(null, rsiLast);

    // Bullish divergence: price lower low, RSI higher low
    if (priceMinLast < priceMinFirst * 0.99 && rsiMinLast > rsiMinFirst + 3) {
        return { type: 'bullish', desc: 'Price making lower lows but RSI rising — momentum exhaustion, potential reversal UP' };
    }
    // Bearish divergence: price higher high, RSI lower high
    if (priceMaxLast > priceMaxFirst * 1.01 && rsiMaxLast < rsiMaxFirst - 3) {
        return { type: 'bearish', desc: 'Price making higher highs but RSI falling — weakening momentum, potential reversal DOWN' };
    }
    return null;
}

// Volume-price confirmation
function volumePriceAnalysis(closes, volumes) {
    if (!volumes || volumes.length < 10 || closes.length < 10) return null;
    var len = Math.min(closes.length, volumes.length);
    var recentVol = volumes.slice(-Math.floor(len*0.25));
    var olderVol = volumes.slice(0, Math.floor(len*0.5));
    var avgRecent = recentVol.reduce(function(a,b){return a+b;},0) / recentVol.length;
    var avgOlder = olderVol.reduce(function(a,b){return a+b;},0) / olderVol.length;
    var volRatio = avgRecent / avgOlder;

    var priceDir = closes[closes.length-1] > closes[Math.floor(closes.length*0.75)] ? 'up' : 'down';

    // Key fix: low volume on decline is NOT automatically bullish
    // It depends on HOW FAR price has already fallen
    var totalDecline = ((closes[closes.length-1] - closes[0]) / closes[0]) * 100;

    if (priceDir === 'down' && volRatio > 1.5) return { signal: 'bearish', desc: 'Heavy selling volume confirms downtrend', volRatio: volRatio };
    if (priceDir === 'down' && volRatio < 0.7 && totalDecline > -3) return { signal: 'bullish', desc: 'Declining volume on minor dip — sellers fading', volRatio: volRatio };
    if (priceDir === 'down' && volRatio < 0.7 && totalDecline <= -3) return { signal: 'bearish', desc: 'Low volume + significant decline — no buying support', volRatio: volRatio };
    if (priceDir === 'up' && volRatio > 1.3) return { signal: 'bullish', desc: 'Rising volume confirms uptrend', volRatio: volRatio };
    if (priceDir === 'up' && volRatio < 0.7) return { signal: 'bearish', desc: 'Weak volume on rally — not convincing', volRatio: volRatio };
    return { signal: 'neutral', desc: 'Volume inconclusive', volRatio: volRatio };
}

// Selling climax detection (volume spike + sharp price drop)
function detectClimax(closes, volumes) {
    if (!volumes || volumes.length < 20 || closes.length < 20) return null;
    var len = Math.min(closes.length, volumes.length);
    var avgVol = volumes.slice(0, Math.floor(len*0.8)).reduce(function(a,b){return a+b;},0) / Math.floor(len*0.8);
    var recentVols = volumes.slice(-5);
    var maxRecentVol = Math.max.apply(null, recentVols);
    var recentDrop = ((closes[closes.length-1] - closes[Math.max(0,closes.length-5)]) / closes[Math.max(0,closes.length-5)]) * 100;

    if (maxRecentVol > avgVol * 2.5 && recentDrop < -3) {
        return { detected: true, desc: 'Volume spike with sharp drop — possible capitulation/selling climax (often near bottom)' };
    }
    return null;
}

// Trend exhaustion (consecutive candles in one direction)
function detectExhaustion(closes) {
    if (closes.length < 10) return null;
    var consecutive = 0;
    for (var i = closes.length-1; i > 0; i--) {
        if (closes[i] < closes[i-1]) consecutive++;
        else break;
    }
    var consecUp = 0;
    for (var i = closes.length-1; i > 0; i--) {
        if (closes[i] > closes[i-1]) consecUp++;
        else break;
    }
    if (consecutive >= 7) return { dir: 'down', count: consecutive, desc: consecutive + ' consecutive lower closes — trend may be exhausting' };
    if (consecUp >= 7) return { dir: 'up', count: consecUp, desc: consecUp + ' consecutive higher closes — rally may be overextended' };
    return null;
}

// Rate of change acceleration
function calcAcceleration(closes) {
    if (closes.length < 20) return null;
    var quarter = Math.floor(closes.length * 0.25);
    var roc1 = ((closes[closes.length-1-quarter] - closes[closes.length-1-quarter*2]) / closes[closes.length-1-quarter*2]) * 100;
    var roc2 = ((closes[closes.length-1] - closes[closes.length-1-quarter]) / closes[closes.length-1-quarter]) * 100;
    var accel = roc2 - roc1;
    return { roc1: roc1, roc2: roc2, acceleration: accel };
}

// Risk/Reward from support/resistance
function findSR(closes) {
    if (closes.length < 20) return { supports:[], resistances:[] };
    var cur = closes[closes.length-1];
    var levels = [];
    for (var i=5; i<closes.length-5; i++) {
        var w = closes.slice(i-5, i+6);
        if (closes[i] === Math.max.apply(null,w)) levels.push({price:closes[i], type:'resistance'});
        if (closes[i] === Math.min.apply(null,w)) levels.push({price:closes[i], type:'support'});
    }
    var clustered = [];
    levels.sort(function(a,b){return a.price-b.price;});
    var thresh = cur * 0.01;
    for (var i=0; i<levels.length; i++) {
        var found = false;
        for (var j=0; j<clustered.length; j++) {
            if (Math.abs(clustered[j].price - levels[i].price) < thresh) { clustered[j].hits++; found=true; break; }
        }
        if (!found) clustered.push({price:levels[i].price, type:levels[i].type, hits:1});
    }
    var nearby = clustered.filter(function(l){return Math.abs(l.price-cur)/cur<0.15;}).sort(function(a,b){return b.hits-a.hits;}).slice(0,8);
    return {
        supports: nearby.filter(function(l){return l.price<cur;}).sort(function(a,b){return b.price-a.price;}).slice(0,3),
        resistances: nearby.filter(function(l){return l.price>cur;}).sort(function(a,b){return a.price-b.price;}).slice(0,3),
    };
}

function calcRiskReward(price, sr) {
    if (!price || sr.supports.length === 0 || sr.resistances.length === 0) return null;
    var nearestSupport = sr.supports[0].price;
    var nearestResist = sr.resistances[0].price;
    var riskDown = ((price - nearestSupport) / price) * 100;
    var rewardUp = ((nearestResist - price) / price) * 100;
    var ratio = rewardUp / (riskDown || 0.1);
    return { riskDown: riskDown, rewardUp: rewardUp, ratio: ratio, support: nearestSupport, resistance: nearestResist };
}

// === REVERSAL RADAR ===

function detectReversal(closes, volumes, rsiSeries, fearGreed) {
    var signals = [];
    var score = 0;
    var len = closes.length;
    if (len < 20) return { signals: signals, score: 0, probability: 0 };

    var cur = closes[len-1];

    // 1. Higher Low Formation — find swing lows, check if latest is higher
    var swingLows = [];
    for (var i = 3; i < len-3; i++) {
        var w = closes.slice(i-3, i+4);
        if (closes[i] === Math.min.apply(null, w)) swingLows.push({ idx: i, price: closes[i] });
    }
    if (swingLows.length >= 2) {
        var lastTwo = swingLows.slice(-2);
        if (lastTwo[1].price > lastTwo[0].price * 1.005) {
            signals.push({ name: 'Higher Low', active: true, desc: 'Latest swing low ($'+Math.round(lastTwo[1].price).toLocaleString()+') is above previous ($'+Math.round(lastTwo[0].price).toLocaleString()+') — structure turning bullish', weight: 20 });
            score += 20;
        } else if (lastTwo[1].price < lastTwo[0].price * 0.995) {
            signals.push({ name: 'Higher Low', active: false, desc: 'Still making lower lows — downtrend intact', weight: 0 });
        } else {
            signals.push({ name: 'Higher Low', active: false, desc: 'Equal lows — potential double bottom forming', weight: 10 });
            score += 10;
        }
    }

    // 2. Bullish MACD Crossover (MACD crossing above signal while negative)
    if (len >= 35) {
        var e12 = calcEMA(closes, 12), e26 = calcEMA(closes, 26);
        var macdLine = e12.map(function(v,i){return v-e26[i];});
        var sigLine = calcEMA(macdLine.slice(26), 9);
        var macdNow = macdLine[macdLine.length-1];
        var sigNow = sigLine[sigLine.length-1];
        var macdPrev = macdLine[macdLine.length-2];
        var sigPrev = sigLine[sigLine.length-2];
        if (macdNow > sigNow && macdPrev <= sigPrev && macdNow < 0) {
            signals.push({ name: 'MACD Bullish Cross', active: true, desc: 'MACD just crossed above signal line while negative — momentum shifting up', weight: 18 });
            score += 18;
        } else if (macdNow > sigNow && macdNow < 0) {
            signals.push({ name: 'MACD Bullish Cross', active: true, desc: 'MACD above signal (negative territory) — recovery underway', weight: 10 });
            score += 10;
        } else {
            signals.push({ name: 'MACD Bullish Cross', active: false, desc: 'MACD still below signal — no crossover yet', weight: 0 });
        }
    }

    // 3. Volume Dry-Up then Green Spike
    if (volumes && volumes.length >= 20) {
        var vLen = Math.min(len, volumes.length);
        var recentV = volumes.slice(-5);
        var olderV = volumes.slice(-20, -5);
        var avgOlder = olderV.reduce(function(a,b){return a+b;},0) / olderV.length;
        var minRecent = Math.min.apply(null, recentV.slice(0,-1));
        var lastVol = recentV[recentV.length-1];
        var lastCandle = closes[len-1] - closes[len-2];
        if (minRecent < avgOlder * 0.6 && lastVol > avgOlder * 1.3 && lastCandle > 0) {
            signals.push({ name: 'Volume Dry-up + Spike', active: true, desc: 'Volume dropped (sellers exhausted) then spiked on green candle — buyers arriving', weight: 16 });
            score += 16;
        } else if (minRecent < avgOlder * 0.6) {
            signals.push({ name: 'Volume Dry-up + Spike', active: false, desc: 'Volume drying up (good) but no buying spike yet — waiting', weight: 5 });
            score += 5;
        } else {
            signals.push({ name: 'Volume Dry-up + Spike', active: false, desc: 'No volume pattern detected', weight: 0 });
        }
    }

    // 4. Long Lower Wicks (buying pressure at lows) — approximated from close data
    if (len >= 10) {
        var wickCount = 0;
        for (var i = len-5; i < len; i++) {
            var localMin = Math.min(closes[i], closes[i-1]);
            var localMax = Math.max(closes[i], closes[i-1]);
            var range = localMax - localMin;
            // If price recovered most of the drop = long lower wick equivalent
            if (closes[i] > closes[i-1] && i > 0 && closes[i-1] < closes[i-2]) wickCount++;
        }
        if (wickCount >= 3) {
            signals.push({ name: 'Buying at Lows', active: true, desc: wickCount+' of last 5 candles show recovery from drops — buyers defending', weight: 12 });
            score += 12;
        } else if (wickCount >= 2) {
            signals.push({ name: 'Buying at Lows', active: false, desc: 'Some buying at lows but not convincing yet', weight: 5 });
            score += 5;
        } else {
            signals.push({ name: 'Buying at Lows', active: false, desc: 'No significant buying at lows', weight: 0 });
        }
    }

    // 5. OBV Divergence (cumulative volume direction vs price)
    if (volumes && volumes.length >= 20 && len >= 20) {
        var vLen = Math.min(len, volumes.length);
        var obvStart = 0, obvEnd = 0;
        var halfPt = Math.floor(vLen/2);
        for (var i = 1; i < halfPt; i++) {
            var idx = vLen - halfPt + i - (volumes.length - vLen);
            if (idx >= 1 && idx < volumes.length) {
                obvStart += closes[len-vLen+idx] > closes[len-vLen+idx-1] ? volumes[idx] : -volumes[idx];
            }
        }
        for (var i = halfPt; i < vLen; i++) {
            var idx = i;
            if (idx >= 1 && idx < volumes.length) {
                obvEnd += closes[len-vLen+idx] > closes[len-vLen+idx-1] ? volumes[idx] : -volumes[idx];
            }
        }
        var priceDown = closes[len-1] < closes[Math.floor(len*0.5)];
        if (priceDown && obvEnd > obvStart) {
            signals.push({ name: 'OBV Divergence', active: true, desc: 'Price declining but OBV rising — smart money accumulating', weight: 15 });
            score += 15;
        } else {
            signals.push({ name: 'OBV Divergence', active: false, desc: 'No accumulation divergence', weight: 0 });
        }
    }

    // 6. Fear + Oversold Combo (historically best entries)
    var lastRSI = rsiSeries.length > 0 ? rsiSeries[rsiSeries.length-1] : null;
    if (fearGreed !== null && lastRSI !== null) {
        if (fearGreed < 25 && lastRSI < 35) {
            signals.push({ name: 'Fear + Oversold Combo', active: true, desc: 'Fear & Greed at '+fearGreed+' AND RSI at '+lastRSI.toFixed(0)+' — historically the best entry zone', weight: 20 });
            score += 20;
        } else if (fearGreed < 35 && lastRSI < 40) {
            signals.push({ name: 'Fear + Oversold Combo', active: false, desc: 'Approaching combo zone (F&G: '+fearGreed+', RSI: '+lastRSI.toFixed(0)+') — watch closely', weight: 8 });
            score += 8;
        } else {
            signals.push({ name: 'Fear + Oversold Combo', active: false, desc: 'Not in fear+oversold zone yet', weight: 0 });
        }
    }

    // 7. Bollinger Band Re-entry
    var bbP = Math.max(5, Math.min(20, Math.floor(len*0.3)));
    var bb = calcBB(closes, bbP, 2);
    if (bb && len >= 3) {
        var prevClose = closes[len-2];
        var prevBB = calcBB(closes.slice(0,-1), bbP, 2);
        if (prevBB && prevClose < prevBB.lower && cur > bb.lower) {
            signals.push({ name: 'BB Re-entry', active: true, desc: 'Price crossed back above lower Bollinger Band — mean reversion starting', weight: 14 });
            score += 14;
        } else if (cur < bb.lower) {
            signals.push({ name: 'BB Re-entry', active: false, desc: 'Still below lower band — waiting for re-entry', weight: 3 });
            score += 3;
        } else {
            signals.push({ name: 'BB Re-entry', active: false, desc: 'Price within bands — no reversal signal', weight: 0 });
        }
    }

    // 8. Slope Flattening (rounding bottom)
    if (len >= 30) {
        var third = Math.floor(len/3);
        var slope1 = ((closes[third] - closes[0]) / closes[0]) * 100;
        var slope2 = ((closes[third*2] - closes[third]) / closes[third]) * 100;
        var slope3 = ((closes[len-1] - closes[third*2]) / closes[third*2]) * 100;
        // Rounding bottom: slope goes from very negative to less negative to flat/positive
        if (slope1 < -2 && slope3 > slope2 && slope3 > slope1) {
            var flattening = slope3 - slope1;
            if (slope3 > 0) {
                signals.push({ name: 'Rounding Bottom', active: true, desc: 'Price slope reversed from '+slope1.toFixed(1)+'% to +'+slope3.toFixed(1)+'% — classic rounding bottom', weight: 18 });
                score += 18;
            } else if (flattening > 3) {
                signals.push({ name: 'Slope Flattening', active: true, desc: 'Decline flattening ('+slope1.toFixed(1)+'% to '+slope3.toFixed(1)+'%) — bottom forming', weight: 12 });
                score += 12;
            } else {
                signals.push({ name: 'Slope Flattening', active: false, desc: 'Still declining at similar pace', weight: 0 });
            }
        } else {
            signals.push({ name: 'Slope Flattening', active: false, desc: 'No rounding bottom pattern', weight: 0 });
        }
    }

    // RSI Divergence (already calculated elsewhere but include in reversal)
    if (rsiSeries.length >= 20) {
        var div = detectDivergence(closes, rsiSeries);
        if (div && div.type === 'bullish') {
            signals.push({ name: 'RSI Divergence', active: true, desc: div.desc, weight: 18 });
            score += 18;
        } else {
            signals.push({ name: 'RSI Divergence', active: false, desc: 'No bullish divergence', weight: 0 });
        }
    }

    // Max possible score
    var maxScore = 20+18+16+12+15+20+14+18+18; // 151
    var probability = Math.min(95, Math.round((score / maxScore) * 100));

    return { signals: signals, score: score, maxScore: maxScore, probability: probability };
}

// === SCORING ===

function getScoreColor(s) { return s>=60?'#00e676':s>=20?'#66ffa6':s>-20?'#ffd740':s>-60?'#ff8a65':'#ff5252'; }
function getRSIColor(r) { return r>70?'#ff5252':r<30?'#00e676':r<40?'#ff8a65':r>60?'#66ffa6':'#ffd740'; }

function computeAll(closes, volumes, fearGreedVal, fundingRate, btcDom) {
    var indicators = [];
    var totalW = 0, weightedSum = 0;
    var reasons = [];

    function add(name, value, desc, cls, score, weight, explain) {
        indicators.push({name:name, value:value, desc:desc, class:cls, score:score, explain:explain||''});
        weightedSum += score * weight; totalW += weight;
    }

    // #1 Period Performance
    if (closes.length > 2) {
        var pc = ((closes[closes.length-1] - closes[0]) / closes[0]) * 100;
        var s,c,d;
        if (pc>10){s=90;c='bullish';d='Massive rally';}
        else if(pc>5){s=70;c='bullish';d='Strong rally';}
        else if(pc>2){s=40;c='bullish';d='Solid gains';}
        else if(pc>0.5){s=15;c='bullish';d='Mild gains';}
        else if(pc>-0.5){s=0;c='neutral';d='Flat';}
        else if(pc>-2){s=-15;c='bearish';d='Mild losses';}
        else if(pc>-5){s=-40;c='bearish';d='Downtrend';}
        else if(pc>-10){s=-70;c='bearish';d='Heavy selling';}
        else{s=-90;c='bearish';d='Severe selloff';}
        add('Period Change', (pc>0?'+':'')+pc.toFixed(2)+'%', d, c, s, 22,
            'Simply: how much did the price go up or down from start to end of this time window. This is the most basic "is it going up or down?" check.');
        if (Math.abs(pc) > 3) reasons.push((pc<0?'Down ':'Up ')+Math.abs(pc).toFixed(1)+'% this period');
    }

    // #2 Drawdown from high
    if (closes.length > 5) {
        var high = Math.max.apply(null, closes);
        var dd = ((closes[closes.length-1] - high) / high) * 100;
        var s,c,d;
        if(dd>-1){s=25;c='bullish';d='Near period high';}
        else if(dd>-3){s=0;c='neutral';d='Minor pullback';}
        else if(dd>-5){s=-20;c='bearish';d='Moderate drawdown';}
        else if(dd>-10){s=-50;c='bearish';d='Significant drawdown';}
        else if(dd>-15){s=-70;c='bearish';d='Major drawdown';}
        else{s=-90;c='bearish';d='Severe crash';}
        add('Drawdown from High', dd.toFixed(2)+'%', d+' (High: $'+Math.round(high).toLocaleString()+')', c, s, 18,
            'How far the price has fallen from its highest point in this period. Like measuring how far you are from the mountain peak. Bigger drops = more pain for holders.');
        if (dd < -5) reasons.push(Math.abs(dd).toFixed(1)+'% below period high');
    }

    // #3 Trend Consistency
    if (closes.length > 10) {
        var down=0; for(var i=1;i<closes.length;i++){if(closes[i]<closes[i-1])down++;}
        var dp=(down/(closes.length-1))*100;
        var s,c,d;
        if(dp>65){s=-60;c='bearish';d=dp.toFixed(0)+'% candles red — persistent selling';}
        else if(dp>55){s=-25;c='bearish';d='More sellers than buyers';}
        else if(dp>45){s=0;c='neutral';d='Choppy/mixed';}
        else if(dp>35){s=25;c='bullish';d='More buyers than sellers';}
        else{s=60;c='bullish';d='Persistent buying';}
        add('Trend Consistency', dp.toFixed(0)+'% down', d, c, s, 14,
            'Counts how many times the price went down vs up. If 60% of price ticks are red, sellers are clearly in control. Think of it like a vote: are more "moments" going up or down?');
        if (dp > 60) reasons.push('Persistent selling ('+dp.toFixed(0)+'% candles declining)');
        if (dp < 40) reasons.push('Consistent buying (only '+dp.toFixed(0)+'% candles declining)');
    }

    // #4 Volume-Price Confirmation
    var vpa = volumePriceAnalysis(closes, volumes);
    if (vpa) {
        var s,c;
        if(vpa.signal==='bearish'){s=-35;c='bearish';}
        else if(vpa.signal==='bullish'){s=35;c='bullish';}
        else{s=0;c='neutral';}
        add('Volume Confirmation', vpa.volRatio.toFixed(1)+'x avg', vpa.desc, c, s, 12,
            'Volume = how much money is being traded. When price drops AND volume is high, it means lots of people are actively selling (bad). When price drops but volume is low, sellers may be running out of steam (potentially good).');
        if (vpa.signal !== 'neutral') reasons.push(vpa.desc);
    }

    // #5 RSI
    var rsi = calcRSI(closes, 14);
    if (rsi !== null) {
        var s,c,d;
        if(rsi>70){s=-50-((rsi-70)/30)*50;c='bearish';d='Overbought';}
        else if(rsi<30){s=50+((30-rsi)/30)*50;c='bullish';d='Oversold — reversal zone';}
        else if(rsi<40){s=-25;c='bearish';d='Weak — selling pressure';}
        else if(rsi>60){s=20;c='bullish';d='Strong buying';}
        else{s=0;c='neutral';d='Neutral';}
        add('RSI (14)', rsi.toFixed(1), d, c, s, 12,
            'Think of RSI like a "tiredness meter" for a trend. Goes from 0-100. Below 30 = selling is exhausted and price often bounces back up. Above 70 = buying is exhausted and price often dips. Like a rubber band — the more you stretch it, the harder it snaps back.');
        if (rsi < 30) reasons.push('RSI oversold at '+rsi.toFixed(0)+' — bounce likely');
        if (rsi > 70) reasons.push('RSI overbought at '+rsi.toFixed(0)+' — pullback likely');
    }

    // #6 Stochastic RSI
    var rsiS = calcRSISeries(closes, 14);
    var stoch = calcStochRSI(rsiS, 14);
    if (stoch !== null) {
        var s,c,d;
        if(stoch>80){s=-35;c='bearish';d='Overbought';}
        else if(stoch<20){s=35;c='bullish';d='Oversold';}
        else{s=0;c='neutral';d='Mid range';}
        add('Stoch RSI', stoch.toFixed(0), d, c, s, 6,
            'A more sensitive version of RSI. It detects momentum shifts earlier. Below 20 = extremely oversold (bounce coming soon). Above 80 = extremely overbought (drop coming soon). Reacts faster than regular RSI.');
    }

    // #7 MACD
    var macd = calcMACD(closes);
    if (macd) {
        var h=macd.histogram, s, c, d;
        if(h>0){s=Math.min(50,h/Math.abs(macd.macd||1)*60);c='bullish';d='Bullish momentum';}
        else{s=Math.max(-50,h/Math.abs(macd.macd||1)*60);c='bearish';d='Bearish momentum';}
        if(Math.abs(h)<Math.abs(macd.macd)*0.05){c='neutral';d='Weak signal';s=0;}
        add('MACD', (h>0?'+':'')+h.toFixed(0), d, c, s, 10,
            'Compares a fast average with a slow average. When the fast one crosses above the slow one, momentum is shifting up (like a car accelerating). When it crosses below, momentum is fading (car braking). The number shows how strong the momentum is.');
    }

    // #8 MA Cross
    var maS=Math.max(5,Math.floor(closes.length*0.15)), maL=Math.max(10,Math.floor(closes.length*0.5));
    var ma1=calcMA(closes,maS), ma2=calcMA(closes,maL);
    if(ma1&&ma2){
        var cross=((ma1-ma2)/ma2)*100;
        var s,c,d;
        if(cross>0.5){c='bullish';d='Short MA above long';s=Math.min(40,cross*10);}
        else if(cross<-0.5){c='bearish';d='Short MA below long';s=Math.max(-40,cross*10);}
        else{c='neutral';d='Converging';s=0;}
        add('MA Cross', (cross>0?'+':'')+cross.toFixed(2)+'%', d, c, s, 10,
            'Compares the recent average price vs the longer-term average. If recent prices are above the longer average, the trend is up (like your recent test scores being above your semester average). Below = downtrend.');
    }

    // #9 Bollinger
    var bbP=Math.max(5,Math.min(20,Math.floor(closes.length*0.3)));
    var bb=calcBB(closes,bbP,2);
    if(bb){
        var s,c,d;
        if(bb.percentB>1){s=-35;c='bearish';d='Above upper band';}
        else if(bb.percentB>0.8){s=-15;c='bearish';d='Near upper band';}
        else if(bb.percentB<0){s=35;c='bullish';d='Below lower band — oversold';}
        else if(bb.percentB<0.2){s=15;c='bullish';d='Near lower band';}
        else{s=0;c='neutral';d='Within bands';}
        add('Bollinger %B', (bb.percentB*100).toFixed(0)+'%', d, c, s, 7,
            'Imagine a "normal zone" around the price (like lanes on a highway). 0-100% = inside the lanes. Below 0% = crashed through the bottom lane (price went unusually low — often bounces back). Above 100% = broke through the top (often falls back).');
        if (bb.percentB < 0) reasons.push('Price below Bollinger lower band — oversold');
    }

    // #10 Fear & Greed
    if(fearGreedVal!==null){
        var s,c,d;
        if(fearGreedVal>=75){s=-35;c='bearish';d='Extreme Greed — contrarian sell';}
        else if(fearGreedVal>=55){s=-10;c='neutral';d='Greed';}
        else if(fearGreedVal>=45){s=0;c='neutral';d='Neutral';}
        else if(fearGreedVal>=25){s=15;c='neutral';d='Fear';}
        else{s=45;c='bullish';d='Extreme Fear — contrarian buy';}
        add('Fear & Greed', fearGreedVal.toString(), d, c, s, 10,
            'A survey of crowd emotion from 0 (extreme terror) to 100 (extreme greed). Works BACKWARDS: when everyone is scared (below 25), it is historically the best time to buy. When everyone is greedy (above 75), crashes often follow. "Be greedy when others are fearful."');
        if(fearGreedVal<25) reasons.push('Extreme Fear ('+fearGreedVal+') — historically good entry');
        if(fearGreedVal>75) reasons.push('Extreme Greed ('+fearGreedVal+') — historically risky');
    }

    // #11 Funding Rate
    if(fundingRate!==null){
        var fr=fundingRate*100, s, c, d;
        if(fr>0.05){s=-25;c='bearish';d='Longs overleveraged';}
        else if(fr>0.01){s=-5;c='neutral';d='Slightly long-biased';}
        else if(fr<-0.05){s=25;c='bullish';d='Shorts overleveraged';}
        else if(fr<-0.01){s=5;c='neutral';d='Slightly short-biased';}
        else{s=0;c='neutral';d='Balanced';}
        add('Funding Rate', (fr>0?'+':'')+fr.toFixed(4)+'%', d, c, s, 6,
            'Shows how leveraged traders are betting. Positive = too many people betting on price going up (crowded trade, risky). Negative = too many betting on price going down. Crowded bets often reverse because the market moves against the majority.');
    }

    // #12 Acceleration
    var accel = calcAcceleration(closes);
    if (accel) {
        var a = accel.acceleration, s, c, d;
        if (accel.roc2 < -2 && a < -1) { s=-40; c='bearish'; d='Selloff accelerating'; reasons.push('Selling accelerating — getting worse'); }
        else if (accel.roc2 < -1 && a > 1) { s=20; c='bullish'; d='Selloff decelerating — slowing down'; reasons.push('Selloff losing steam — deceleration'); }
        else if (accel.roc2 > 2 && a > 1) { s=30; c='bullish'; d='Rally accelerating'; }
        else if (accel.roc2 > 1 && a < -1) { s=-15; c='bearish'; d='Rally decelerating'; }
        else { s=0; c='neutral'; d='Steady pace'; }
        add('Acceleration', (a>0?'+':'')+a.toFixed(2), d, c, s, 8,
            'Is the drop getting faster or slowing down? Like a car: if the selling is "accelerating" it means things are getting worse. If it is "decelerating" the sellers are running out of energy — bottom may be near.');
    }

    // #13 Exhaustion
    var exhaust = detectExhaustion(closes);
    if (exhaust) {
        if (exhaust.dir === 'down') { add('Trend Exhaustion', exhaust.count+' red', exhaust.desc+' — bounce likely', 'bullish', 25, 8,
            'When the price drops many times in a row without any bounce, it usually means the selling is almost done. Like a ball bouncing — after enough drops it runs out of energy. 7+ consecutive drops almost always get a relief bounce.');
            reasons.push(exhaust.count+' consecutive down candles — exhaustion/bounce likely'); }
        else { add('Trend Exhaustion', exhaust.count+' green', exhaust.desc+' — pullback likely', 'bearish', -25, 8,
            'When price rises many times in a row without a break, it usually needs to "catch its breath" with a pullback. Like running uphill without stopping — you eventually need a rest.'); }
    }

    // #14 Climax
    var climax = detectClimax(closes, volumes);
    if (climax && climax.detected) {
        add('Selling Climax', 'DETECTED', climax.desc, 'bullish', 30, 10,
            'A "capitulation" event: massive trading volume happens during a sharp crash. This means the last panic sellers are dumping everything at once. Historically, these "puke" moments mark the bottom because there is no one left to sell.');
        reasons.push('Selling climax detected — possible capitulation bottom');
    }

    // #15 LOWER HIGHS / LOWER LOWS (market structure breakdown)
    if (closes.length >= 20) {
        var segLen = Math.floor(closes.length / 4);
        var segs = [];
        for (var i=0; i<4; i++) segs.push(closes.slice(i*segLen, (i+1)*segLen));
        var segHighs = segs.map(function(s){ return Math.max.apply(null,s); });
        var segLows = segs.map(function(s){ return Math.min.apply(null,s); });
        var lowerHighs = segHighs[0]>segHighs[1] && segHighs[1]>segHighs[2] && segHighs[2]>segHighs[3];
        var lowerLows = segLows[0]>segLows[1] || (segLows[1]>segLows[2] && segLows[2]>segLows[3]);
        var higherHighs = segHighs[0]<segHighs[1] && segHighs[1]<segHighs[2] && segHighs[2]<segHighs[3];
        var higherLows = segLows[0]<segLows[1] && segLows[1]<segLows[2] && segLows[2]<segLows[3];

        if (lowerHighs && lowerLows) {
            add('Market Structure', 'BREAKDOWN', 'Lower highs AND lower lows — textbook downtrend', 'bearish', -70, 18,
                'Each peak is lower than the last AND each dip is lower than the last. This is the clearest possible sign of a downtrend. Think of it like a staircase going down — each step (both up-bounces and down-dips) is lower than before.');
            reasons.push('Lower highs + lower lows — structural downtrend');
        } else if (lowerHighs) {
            add('Market Structure', 'WEAKENING', 'Lower highs forming — each rally weaker than last', 'bearish', -45, 15,
                'Each bounce/rally is weaker than the previous one. Like a ball bouncing lower each time — eventually it stops bouncing. Buyers are losing conviction.');
            reasons.push('Lower highs — each rally weaker');
        } else if (higherHighs && higherLows) {
            add('Market Structure', 'UPTREND', 'Higher highs and higher lows — healthy uptrend', 'bullish', 50, 15,
                'Each peak is higher than the last AND each dip is shallower. This is a healthy staircase going UP. Buyers are in control and getting more aggressive.');
        } else {
            add('Market Structure', 'MIXED', 'No clear structural pattern', 'neutral', 0, 5,
                'The peaks and valleys are not forming a clear staircase up or down. The market is choppy and undecided.');
        }
    }

    // #16 LOW VOLUME IN DOWNTREND = NO BUYERS (fixes the critical miss)
    if (volumes && volumes.length >= 20 && closes.length >= 20) {
        var priceDown = closes[closes.length-1] < closes[0];
        var vLen2 = Math.min(closes.length, volumes.length);
        var recentV2 = volumes.slice(-Math.floor(vLen2*0.3));
        var olderV2 = volumes.slice(0, Math.floor(vLen2*0.5));
        var avgR2 = recentV2.reduce(function(a,b){return a+b;},0)/recentV2.length;
        var avgO2 = olderV2.reduce(function(a,b){return a+b;},0)/olderV2.length;
        var vRatio2 = avgR2 / avgO2;

        if (priceDown && vRatio2 < 0.75) {
            // Low volume + price declining = no buying support (NOT bullish exhaustion)
            var drawdownNow = ((closes[closes.length-1] - Math.max.apply(null,closes)) / Math.max.apply(null,closes)) * 100;
            if (drawdownNow < -5) {
                add('Buyer Absence', 'LOW VOL', 'Declining price with no buying volume — no support below', 'bearish', -40, 14,
                    'IMPORTANT: Low volume during a decline does NOT always mean "sellers are exhausted." When price is already down significantly and volume dries up, it often means BUYERS have disappeared. If a new wave of selling hits, there is no one to buy = crash. Like a house with no foundation.');
                reasons.push('No buying volume during decline — support absent');
            }
        }
    }

    // #17 RSI SUSTAINED WEAKNESS (RSI staying below 50 in decline = not recovering)
    if (rsi !== null && closes.length > 20) {
        var priceInDecline = closes[closes.length-1] < closes[0];
        var rsiStuckLow = rsi < 50 && rsi > 30; // In "weak" zone, not oversold
        if (priceInDecline && rsiStuckLow) {
            // Check if RSI has been below 50 consistently
            var rsiBelow50 = 0;
            var rsiCheck = calcRSISeries(closes, 14);
            var rsiLast = rsiCheck.slice(-Math.floor(rsiCheck.length*0.3));
            for (var i=0; i<rsiLast.length; i++) { if(rsiLast[i]<50) rsiBelow50++; }
            var pctBelow50 = (rsiBelow50/rsiLast.length)*100;
            if (pctBelow50 > 70) {
                add('RSI Weakness', pctBelow50.toFixed(0)+'% below 50', 'RSI stuck below 50 — momentum not recovering', 'bearish', -30, 10,
                    'When RSI stays below 50 for a long time during a decline without bouncing back up, it means the market has NO upward energy. A healthy market would see RSI bounce above 50 occasionally. Stuck below = sustained weakness with more downside likely.');
                reasons.push('RSI stuck below 50 — no recovery momentum');
            }
        }
    }

    // #18 TOPPING PATTERN (multiple rejections at same level)
    if (closes.length >= 30) {
        var topZone = Math.max.apply(null, closes) * 0.98; // within 2% of high
        var touches = 0;
        var rejections = 0;
        for (var i=1; i<closes.length-1; i++) {
            if (closes[i] >= topZone) {
                touches++;
                if (closes[i+1] < closes[i]) rejections++;
            }
        }
        if (touches >= 3 && rejections >= 2 && closes[closes.length-1] < topZone) {
            add('Resistance Rejection', touches+'x tested', touches+' attempts to break the high, '+rejections+' rejected — distribution', 'bearish', -35, 12,
                'Price tried to break above the same level multiple times but kept getting pushed back down. This means there are large sellers at that price who keep unloading. Eventually, buyers give up and price drops sharply. Like trying to break through a ceiling repeatedly and failing.');
            reasons.push('Multiple rejections at resistance — ceiling holding');
        }
    }

    // #19 STATISTICAL ANALYSIS — advanced math-based signals
    if (closes.length >= 30) {
        // Z-Score (how many standard deviations from mean)
        var zWindow = Math.min(50, closes.length);
        var zSlice = closes.slice(-zWindow);
        var zMean = zSlice.reduce(function(a,b){return a+b;},0)/zSlice.length;
        var zVariance = zSlice.reduce(function(a,b){return a+(b-zMean)*(b-zMean);},0)/zSlice.length;
        var zStd = Math.sqrt(zVariance);
        var zScore = zStd > 0 ? (closes[closes.length-1] - zMean) / zStd : 0;

        var zS, zC, zD;
        if (zScore < -2) { zS=50; zC='bullish'; zD='Extremely oversold ('+zScore.toFixed(2)+' std devs below mean)'; }
        else if (zScore < -1) { zS=20; zC='bullish'; zD='Oversold ('+zScore.toFixed(2)+' std devs below)'; }
        else if (zScore > 2) { zS=-50; zC='bearish'; zD='Extremely overbought'; }
        else if (zScore > 1) { zS=-20; zC='bearish'; zD='Overbought'; }
        else { zS=0; zC='neutral'; zD='Normal range'; }
        add('Z-Score', zScore.toFixed(2), zD, zC, zS, 8,
            'Measures how far price is from its average in standard deviations. Below -2 = price is abnormally low (only happens 2.5% of the time statistically). Like a ball pushed underwater — the further down, the harder it snaps back. Above +2 = abnormally high, expect pullback.');

        // Velocity + Acceleration
        var velWindow = Math.max(5, Math.floor(closes.length*0.12));
        var vels = [];
        for (var i=closes.length-velWindow; i<closes.length; i++) { if(i>0) vels.push(closes[i]-closes[i-1]); }
        var avgVel = vels.reduce(function(a,b){return a+b;},0)/vels.length;
        var accels2 = [];
        for (var i=1; i<vels.length; i++) accels2.push(vels[i]-vels[i-1]);
        var avgAccel = accels2.length > 0 ? accels2.reduce(function(a,b){return a+b;},0)/accels2.length : 0;

        var aS, aC, aD;
        if (avgVel < 0 && avgAccel > 0) { aS=35; aC='bullish'; aD='Selloff DECELERATING — slowing down'; reasons.push('Selloff decelerating — bottom may be forming'); }
        else if (avgVel < 0 && avgAccel <= 0) { aS=-35; aC='bearish'; aD='Selloff ACCELERATING — getting worse'; }
        else if (avgVel > 0 && avgAccel > 0) { aS=25; aC='bullish'; aD='Rally accelerating'; }
        else if (avgVel > 0 && avgAccel <= 0) { aS=-10; aC='neutral'; aD='Rally losing steam'; }
        else { aS=0; aC='neutral'; aD='No clear momentum'; }
        add('Price Acceleration', (avgAccel>0?'+':'')+avgAccel.toFixed(2), aD, aC, aS, 12,
            'Uses physics: Velocity = how fast price is moving. Acceleration = is it speeding up or slowing down? The KEY signal is when a selloff DECELERATES (velocity still negative but acceleration positive). This means selling is running out of energy — like a car braking before stopping. This is often the first signal of a bottom, before price actually turns up.');

        // Mean Reversion (distance from 30-day MA)
        var mrPeriod = Math.min(closes.length, 100);
        var mrMA = closes.slice(-mrPeriod).reduce(function(a,b){return a+b;},0)/mrPeriod;
        var mrDev = ((closes[closes.length-1] - mrMA) / mrMA) * 100;

        var mS, mC, mD;
        if (mrDev < -10) { mS=40; mC='bullish'; mD='Rubber band VERY stretched ('+mrDev.toFixed(1)+'% below average)'; }
        else if (mrDev < -5) { mS=20; mC='bullish'; mD='Below average — reversion likely'; }
        else if (mrDev > 10) { mS=-40; mC='bearish'; mD='Far above average — pullback likely'; }
        else if (mrDev > 5) { mS=-20; mC='bearish'; mD='Above average'; }
        else { mS=0; mC='neutral'; mD='Near average'; }
        add('Mean Reversion', mrDev.toFixed(1)+'%', mD, mC, mS, 10,
            'Price always returns to its average over time (like a rubber band). The further it stretches away, the stronger the snap-back force. At -10%+ below average, history shows price almost always bounces back within days. At +10% above, it usually pulls back. NOT a timing signal (it can stay stretched), but tells you the DIRECTION of the eventual move.');

        // VWAP Deviation
        if (volumes && volumes.length >= 20) {
            var vwLen = Math.min(closes.length, volumes.length, 100);
            var vwP = closes.slice(-vwLen), vwV = volumes.slice(-vwLen);
            var vwTotal = vwV.reduce(function(a,b){return a+b;},0);
            var vwap2 = vwTotal > 0 ? vwP.reduce(function(a,p,i){return a+p*vwV[i];},0)/vwTotal : closes[closes.length-1];
            var vwDev = ((closes[closes.length-1] - vwap2) / vwap2) * 100;

            var vS, vC, vD;
            if (vwDev < -5) { vS=-20; vC='bearish'; vD='Well below VWAP — recent buyers losing badly'; }
            else if (vwDev < -1) { vS=-10; vC='bearish'; vD='Below VWAP — average buyer underwater'; }
            else if (vwDev > 5) { vS=15; vC='bullish'; vD='Well above VWAP — buyers in profit'; }
            else if (vwDev > 1) { vS=10; vC='bullish'; vD='Above VWAP — buyers profitable'; }
            else { vS=0; vC='neutral'; vD='At VWAP — fair value'; }
            add('VWAP Deviation', vwDev.toFixed(1)+'%', vD, vC, vS, 6,
                'VWAP = the average price people actually paid (weighted by how much they bought). If current price is BELOW VWAP, most recent buyers are losing money and may panic sell. If ABOVE, buyers are happy and tend to hold. Think of it as "is the average person winning or losing right now?"');
        }

        // Volatility Squeeze Detection
        var sqPeriod = Math.min(20, Math.floor(closes.length*0.3));
        var sqSlice = closes.slice(-sqPeriod);
        var sqMean2 = sqSlice.reduce(function(a,b){return a+b;},0)/sqSlice.length;
        var sqStd2 = Math.sqrt(sqSlice.reduce(function(a,b){return a+(b-sqMean2)*(b-sqMean2);},0)/sqSlice.length);
        var sqBW = (sqStd2*4)/sqMean2*100;

        if (closes.length >= sqPeriod*2) {
            var olderSlice = closes.slice(-sqPeriod*2, -sqPeriod);
            var olderMean = olderSlice.reduce(function(a,b){return a+b;},0)/olderSlice.length;
            var olderStd = Math.sqrt(olderSlice.reduce(function(a,b){return a+(b-olderMean)*(b-olderMean);},0)/olderSlice.length);
            var olderBW = (olderStd*4)/olderMean*100;
            var bwChange = olderBW > 0 ? ((sqBW - olderBW)/olderBW)*100 : 0;

            var sqS, sqC, sqD;
            if (bwChange < -50) { sqS=0; sqC='neutral'; sqD='SQUEEZE — big move coming (direction unknown)'; reasons.push('Volatility squeeze: big price move imminent'); }
            else if (bwChange > 80) { sqS=0; sqC='neutral'; sqD='Expansion — big move happening now'; }
            else { sqS=0; sqC='neutral'; sqD='Normal volatility'; }
            add('Volatility Squeeze', bwChange.toFixed(0)+'%', sqD, sqC, sqS, 3,
                'When price trades in a tight range (low volatility), it is "compressing" like a spring. The tighter it gets, the bigger the eventual breakout. A -50%+ squeeze means a large move is imminent — but it does NOT tell you which direction. Combine with other signals to determine if the breakout will be up or down.');
        }

        // Price Percentile (where in 90-day range)
        var sortedP = closes.slice().sort(function(a,b){return a-b;});
        var pctile = 0;
        for (var i=0; i<sortedP.length; i++) { if(sortedP[i] <= closes[closes.length-1]) pctile++; }
        pctile = Math.round((pctile/sortedP.length)*100);

        var pS, pC, pD;
        if (pctile <= 5) { pS=30; pC='bullish'; pD='At the BOTTOM of 90-day range ('+pctile+'th percentile)'; }
        else if (pctile <= 20) { pS=15; pC='bullish'; pD='Low in range'; }
        else if (pctile >= 95) { pS=-30; pC='bearish'; pD='At the TOP of 90-day range'; }
        else if (pctile >= 80) { pS=-15; pC='bearish'; pD='High in range'; }
        else { pS=0; pC='neutral'; pD='Mid-range'; }
        add('Price Percentile', pctile+'th', pD, pC, pS, 7,
            'Shows where the current price sits in the range of the last 90 days. 0-10th = price is near the lowest it has been in 3 months (historically good buy zone). 90-100th = near the highest (risky). Think of it as: "compared to the last 3 months, is this price cheap or expensive?"');
    }

    // #20 RALLY ENTRY SIGNAL — backtested with filters that achieved 100% win rate
    // (Uses the statistical signals above as additional confirmation)
    if (closes.length >= 20) {
        var entryScore = 0;
        var entryReasons = [];
        var entryFails = [];
        var entryMax = 0;

        // Condition 1: Prior period slightly positive (market turned from bottom)
        var pc19 = ((closes[closes.length-1] - closes[0]) / closes[0]) * 100;
        if (pc19 > 0 && pc19 < 8) { entryScore += 20; entryReasons.push('Market turned positive (+'+pc19.toFixed(1)+'%)'); }
        else if (pc19 > -2 && pc19 <= 0) { entryScore += 8; entryReasons.push('Market stabilizing ('+pc19.toFixed(1)+'%)'); }
        else { entryFails.push('Market still declining ('+pc19.toFixed(1)+'%) — wait for it to stop'); }
        entryMax += 20;

        // Condition 2: Moderate drawdown from 7d high (-2% to -5%)
        var dd19 = ((closes[closes.length-1] - Math.max.apply(null,closes)) / Math.max.apply(null,closes)) * 100;
        if (dd19 > -5 && dd19 < -2) { entryScore += 15; entryReasons.push('Healthy pullback from 7d high ('+dd19.toFixed(1)+'%)'); }
        else if (dd19 > -8 && dd19 <= -5) { entryScore += 8; entryReasons.push('Moderate pullback ('+dd19.toFixed(1)+'%)'); }
        else if (dd19 >= -2) { entryFails.push('Too close to 7d high ('+dd19.toFixed(1)+'%) — limited upside room'); }
        else { entryFails.push('Drawdown too deep ('+dd19.toFixed(1)+'%) — crash still active'); }
        entryMax += 15;

        // Condition 3: RSI in 35-55 launch zone
        var rsi19 = calcRSI(closes, 14);
        if (rsi19 !== null && rsi19 >= 35 && rsi19 <= 55) { entryScore += 15; entryReasons.push('RSI in launch zone ('+rsi19.toFixed(0)+')'); }
        else if (rsi19 !== null && rsi19 > 55 && rsi19 < 65) { entryScore += 5; entryReasons.push('RSI slightly elevated ('+rsi19.toFixed(0)+')'); }
        else if (rsi19 !== null && rsi19 < 35) { entryFails.push('RSI too low ('+rsi19.toFixed(0)+') — still in active selloff'); }
        else if (rsi19 !== null) { entryFails.push('RSI too high ('+rsi19.toFixed(0)+') — overbought, no room'); }
        entryMax += 15;

        // Condition 4: Selling pressure stopped
        var recentLen = Math.max(10, Math.floor(closes.length * 0.3));
        var recentSlice = closes.slice(-recentLen);
        var recentDown = 0;
        for (var i=1; i<recentSlice.length; i++) { if(recentSlice[i]<recentSlice[i-1]) recentDown++; }
        var recentDownPct = (recentDown/(recentSlice.length-1))*100;
        if (recentDownPct <= 50) { entryScore += 10; entryReasons.push('Selling stopped ('+recentDownPct.toFixed(0)+'% red recently)'); }
        else { entryFails.push('Still selling ('+recentDownPct.toFixed(0)+'% red) — selling not exhausted yet'); }
        entryMax += 10;

        // Condition 5: Bounce from recent low
        var recentLow = Math.min.apply(null, closes.slice(-Math.max(5, Math.floor(closes.length*0.2))));
        var bounceFromLow = ((closes[closes.length-1] - recentLow) / recentLow) * 100;
        if (bounceFromLow > 0.5 && bounceFromLow < 5) { entryScore += 15; entryReasons.push('Bouncing off low (+'+bounceFromLow.toFixed(1)+'%)'); }
        else if (bounceFromLow <= 0.5) { entryFails.push('No bounce yet — still at the low'); }
        entryMax += 15;

        // === NEW CRITICAL FILTERS (from backtest) ===
        // Filter A: 30-day trend must not be overextended (>8% = buying the top)
        // We use all available data as proxy for longer trend
        var bigTrend = pc19; // Will be replaced with actual 30d data if available
        if (closes.length > 100) {
            var bigSlice = closes.slice(0, Math.floor(closes.length*0.3));
            bigTrend = ((closes[closes.length-1] - bigSlice[0]) / bigSlice[0]) * 100;
        }
        if (bigTrend > 12) { entryScore = Math.max(0, entryScore - 30); entryFails.push('BLOCKER: Larger trend already +'+bigTrend.toFixed(0)+'% — rally exhausted, buying the top'); }
        else if (bigTrend >= -10 && bigTrend <= 8) { entryScore += 15; entryReasons.push('Larger trend not overextended ('+bigTrend.toFixed(1)+'%)'); }
        else if (bigTrend > 8) { entryFails.push('Larger trend elevated (+'+bigTrend.toFixed(1)+'%) — less upside room'); }
        entryMax += 15;

        // Filter B: Must be >4% below the bigger picture high (room to grow)
        var allHigh = Math.max.apply(null, closes);
        var distFromHigh = ((closes[closes.length-1] - allHigh) / allHigh) * 100;
        if (distFromHigh < -4) { entryScore += 10; entryReasons.push('Room to grow ('+distFromHigh.toFixed(1)+'% below high)'); }
        else { entryScore = Math.max(0, entryScore - 20); entryFails.push('BLOCKER: Too close to high ('+distFromHigh.toFixed(1)+'%) — no upside room'); }
        entryMax += 10;

        var entryPct = Math.round((entryScore / entryMax) * 100);
        var entryClass, entryDesc;
        if (entryPct >= 75 && entryFails.length === 0) { entryClass = 'bullish'; entryDesc = 'STRONG ENTRY — All conditions met (100% backtest win rate)'; }
        else if (entryPct >= 60 && entryFails.filter(function(f){return f.indexOf('BLOCKER')===0;}).length === 0) { entryClass = 'bullish'; entryDesc = 'Good setup — most conditions met'; }
        else if (entryPct >= 40) { entryClass = 'neutral'; entryDesc = 'Partial setup — watch for more confirmation'; }
        else { entryClass = 'bearish'; entryDesc = 'NOT a buy — conditions not aligned'; }

        var hasBlocker = entryFails.some(function(f){return f.indexOf('BLOCKER')===0;});
        var entrySignalScore = hasBlocker ? -20 : entryPct >= 75 ? 60 : entryPct >= 60 ? 30 : entryPct >= 40 ? 0 : -25;
        add('Rally Entry', entryPct+'%', entryDesc, entryClass, entrySignalScore, 20,
            'Backtested over 90 days of BTC data. Checks 7 conditions that preceded every profitable multi-day rally. Two BLOCKER filters eliminate false signals that caused 62% of losses: (1) if the bigger trend is already up >12%, you are buying the top; (2) if price is within 4% of the high, there is no room to grow. When all conditions pass with no blockers = historically 100% win rate.');

        indicators.entrySignal = { pct: entryPct, reasons: entryReasons, fails: entryFails, hasBlocker: hasBlocker };
    }

    var composite = totalW > 0 ? Math.round(weightedSum / totalW) : 0;
    composite = Math.max(-100, Math.min(100, composite));

    // Determine action — NEW LOGIC focused on making money
    var action, confidence;
    // Check if Rally Entry signal is strong
    var rallyEntry = indicators.entrySignal ? indicators.entrySignal.pct : 0;

    if (rallyEntry >= 70 && composite > -30) {
        // Strong entry signal overrides mild bearishness — this is the money-making BUY
        action = 'BUY'; confidence = Math.min(90, 55 + rallyEntry - 70);
    } else if (composite >= 40) { action = 'BUY'; confidence = Math.min(90, 55 + (composite-40)); }
    else if (composite >= 15 && rallyEntry >= 50) { action = 'BUY'; confidence = 45 + rallyEntry/5; }
    else if (composite > -12) { action = 'HOLD'; confidence = 50 - Math.abs(composite)*2; }
    else if (composite > -40) { action = 'SELL'; confidence = 50 + Math.abs(composite+12)*1.5; }
    else { action = 'SELL'; confidence = Math.min(95, 65 + Math.abs(composite+40)); }

    // Divergence can override
    var div = detectDivergence(closes, rsiS);
    if (div && div.type === 'bullish' && composite < 0) {
        reasons.unshift('Bullish RSI divergence — reversal signal');
        composite = Math.min(composite + 25, 10);
        if (action === 'SELL') { action = 'HOLD'; confidence = Math.max(40, confidence - 20); }
    }
    if (div && div.type === 'bearish' && composite > 0) {
        reasons.unshift('Bearish RSI divergence — weakening');
        composite = Math.max(composite - 25, -10);
        if (action === 'BUY') { action = 'HOLD'; confidence = Math.max(40, confidence - 20); }
    }

    return { indicators:indicators, composite:composite, bb:bb, action:action, confidence:Math.round(confidence), reasons:reasons.slice(0,5), divergence:div, climax:climax, exhaustion:exhaust, accel:accel };
}

// === MULTI-TIMEFRAME ===

function getMTF(closes) {
    if (closes.length < 4) return [];
    var len=closes.length, cur=closes[len-1], results=[];
    var r1=Math.max(2,Math.floor(len*0.1)); results.push({label:'Recent',pct:((cur-closes[len-1-r1])/closes[len-1-r1])*100});
    var r2=Math.max(3,Math.floor(len*0.5)); results.push({label:'Mid',pct:((cur-closes[len-1-r2])/closes[len-1-r2])*100});
    results.push({label:'Full Period',pct:((cur-closes[0])/closes[0])*100});
    var high=Math.max.apply(null,closes); results.push({label:'From High',pct:((cur-high)/high)*100});
    return results;
}

function drawChart(id, prices, opts) {
    var el=document.getElementById(id); if(!el||prices.length<2) return;
    var ctx=el.getContext('2d'), w=el.width=el.offsetWidth*2, h=el.height=el.offsetHeight*2;
    ctx.clearRect(0,0,w,h);
    var mn=Math.min.apply(null,prices), mx=Math.max.apply(null,prices), rng=mx-mn||1;
    var isUp=prices[prices.length-1]>=prices[0], color=opts.color||(isUp?'#00e676':'#ff5252');
    if(opts.bb){var yU=h-((opts.bb.upper-mn)/rng)*(h-20)-10, yL=h-((opts.bb.lower-mn)/rng)*(h-20)-10, yM=h-((opts.bb.mean-mn)/rng)*(h-20)-10;
        ctx.fillStyle='rgba(3,181,255,0.05)'; ctx.fillRect(0,yU,w,yL-yU);
        ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(3,181,255,0.3)'; ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(0,yU);ctx.lineTo(w,yU);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,yL);ctx.lineTo(w,yL);ctx.stroke();
        ctx.strokeStyle='rgba(3,181,255,0.15)'; ctx.beginPath();ctx.moveTo(0,yM);ctx.lineTo(w,yM);ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
    prices.forEach(function(p,i){var x=(i/(prices.length-1))*w, y=h-((p-mn)/rng)*(h-20)-10; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
    ctx.stroke(); ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
    var g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,color+'22'); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fill();
}

function drawRSI(id, series) {
    var el=document.getElementById(id); if(!el||series.length<2)return;
    var ctx=el.getContext('2d'), w=el.width=el.offsetWidth*2, h=el.height=el.offsetHeight*2;
    ctx.clearRect(0,0,w,h);
    var y70=h*0.3,y30=h*0.7,y50=h*0.5;
    ctx.fillStyle='rgba(255,82,82,0.06)';ctx.fillRect(0,0,w,y70);
    ctx.fillStyle='rgba(0,230,118,0.06)';ctx.fillRect(0,y30,w,h-y30);
    ctx.setLineDash([5,4]);ctx.lineWidth=1;
    ctx.strokeStyle='rgba(255,82,82,0.35)';ctx.beginPath();ctx.moveTo(0,y70);ctx.lineTo(w,y70);ctx.stroke();
    ctx.strokeStyle='rgba(0,230,118,0.35)';ctx.beginPath();ctx.moveTo(0,y30);ctx.lineTo(w,y30);ctx.stroke();
    ctx.strokeStyle='rgba(255,215,64,0.15)';ctx.beginPath();ctx.moveTo(0,y50);ctx.lineTo(w,y50);ctx.stroke();
    ctx.setLineDash([]);
    var cur=series[series.length-1], color=getRSIColor(cur);
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;
    series.forEach(function(v,i){var x=(i/(series.length-1))*w,y=h-(v/100)*h; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
    ctx.stroke();
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
    var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,color+'33');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(w-2,h-(cur/100)*h,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.fillStyle='#555';ctx.font='18px sans-serif';ctx.textAlign='left';
    ctx.fillText('70',4,y70-3);ctx.fillText('30',4,y30+14);ctx.fillText('50',4,y50-3);
}

function drawVolume(id, volumes) {
    var el=document.getElementById(id); if(!el||volumes.length<2)return;
    var ctx=el.getContext('2d'), w=el.width=el.offsetWidth*2, h=el.height=el.offsetHeight*2;
    ctx.clearRect(0,0,w,h);
    var mx=Math.max.apply(null,volumes), bw=w/volumes.length;
    var avg=volumes.reduce(function(a,b){return a+b;},0)/volumes.length;
    volumes.forEach(function(v,i){var bh=(v/mx)*(h-10); ctx.fillStyle=v>avg?'rgba(3,181,255,0.5)':'rgba(3,181,255,0.2)'; ctx.fillRect(i*bw+1,h-bh,bw-2,bh);});
    var ay=h-(avg/mx)*(h-10); ctx.setLineDash([4,3]);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,ay);ctx.lineTo(w,ay);ctx.stroke();ctx.setLineDash([]);
}
