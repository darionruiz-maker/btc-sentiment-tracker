var addrCache = {};

function identifyAddress(addr) {
    if (!addr) return null;
    if (KNOWN_ADDR[addr]) return KNOWN_ADDR[addr];
    if (addrCache[addr]) return addrCache[addr];
    return null;
}

function classifyByTxCount(count) {
    if (count > 10000) return 'Exchange';
    if (count > 2000) return 'Exchange/Service';
    if (count > 500) return 'Service';
    if (count > 50) return 'Fund/Business';
    return 'Individual Whale';
}

function identifyTx(tx) {
    var from = [], to = [];
    if (tx.vin) {
        for (var i=0; i<Math.min(tx.vin.length, 3); i++) {
            var addr = tx.vin[i].prevout ? tx.vin[i].prevout.scriptpubkey_address : null;
            var label = identifyAddress(addr);
            if (label && from.indexOf(label) === -1) from.push(label);
        }
    }
    if (tx.vout) {
        for (var i=0; i<Math.min(tx.vout.length, 3); i++) {
            var addr = tx.vout[i].scriptpubkey_address;
            var label = identifyAddress(addr);
            if (label && to.indexOf(label) === -1) to.push(label);
        }
    }
    return { from: from, to: to };
}

function lookupEntities(whaleTxs) {
    // For top 15 txs, lookup sender/receiver addresses to identify entity
    var lookups = [];
    var txsToLookup = whaleTxs.slice(0, 15);
    txsToLookup.forEach(function(wtx, idx) {
        // Lookup sender (first input)
        var fromAddr = wtx._fromAddr;
        var toAddr = wtx._toAddr;
        if (fromAddr && !identifyAddress(fromAddr)) {
            lookups.push(fetchJSON('https://mempool.space/api/address/'+fromAddr).then(function(info){
                var tc = info.chain_stats ? info.chain_stats.tx_count : 0;
                var label = classifyByTxCount(tc);
                addrCache[fromAddr] = label;
                wtx.from = label;
            }).catch(function(){}));
        }
        if (toAddr && !identifyAddress(toAddr)) {
            lookups.push(fetchJSON('https://mempool.space/api/address/'+toAddr).then(function(info){
                var tc = info.chain_stats ? info.chain_stats.tx_count : 0;
                var label = classifyByTxCount(tc);
                addrCache[toAddr] = label;
                wtx.to = label;
            }).catch(function(){}));
        }
    });
    return Promise.allSettled(lookups);
}

function loadWhales() {
    // Use mempool.space (has CORS) — fetch multiple pages per block for better coverage
    fetchJSON('https://mempool.space/api/v1/blocks').then(function(blocks) {
        // Get first 6 blocks, fetch pages 0-3 from each (100 txs per block)
        var blocksToScan = blocks.slice(0, 6);
        var promises = [];
        blocksToScan.forEach(function(b) {
            for (var page = 0; page < 4; page++) {
                promises.push(fetchJSON('https://mempool.space/api/block/'+b.id+'/txs/'+(page*25)));
            }
        });
        return Promise.allSettled(promises);
    }).then(function(results) {
        var whaleTxs = [];
        var seen = {};
        results.forEach(function(r) {
            if (r.status !== 'fulfilled') return;
            r.value.forEach(function(tx) {
                if (seen[tx.txid]) return;
                seen[tx.txid] = true;
                var totalOut = 0;
                for (var i=0; i<tx.vout.length; i++) totalOut += tx.vout[i].value || 0;
                var btc = totalOut / 100000000;
                if (btc >= 10) {
                    var inputs = tx.vin ? tx.vin.length : 0;
                    var outputs = tx.vout ? tx.vout.length : 0;
                    var type;
                    if (outputs > 10) type = 'dist';
                    else if (inputs > 5 && outputs <= 2) type = 'consol';
                    else if (outputs > 3 && outputs <= 10) type = 'dist';
                    else type = 'transfer';
                    var entities = identifyTx(tx);
                    var fromLabel = entities.from.length > 0 ? entities.from.join(', ') : null;
                    var toLabel = entities.to.length > 0 ? entities.to.join(', ') : null;
                    if (toLabel && !fromLabel) type = 'dist';
                    if (fromLabel && !toLabel) type = 'consol';
                    var fromAddr = (tx.vin && tx.vin[0] && tx.vin[0].prevout) ? tx.vin[0].prevout.scriptpubkey_address : null;
                    var toAddr = (tx.vout && tx.vout[0]) ? tx.vout[0].scriptpubkey_address : null;
                    whaleTxs.push({ btc: btc, type: type, inputs: inputs, outputs: outputs, txid: tx.txid, from: fromLabel, to: toLabel, _fromAddr: fromAddr, _toAddr: toAddr });
                }
            });
        });
        whaleTxs.sort(function(a,b){ return b.btc - a.btc; });

        var totalBTC = whaleTxs.reduce(function(a,w){return a+w.btc;},0);
        var distCount = whaleTxs.filter(function(w){return w.type==='dist';}).length;
        var consolCount = whaleTxs.filter(function(w){return w.type==='consol';}).length;
        var transferCount = whaleTxs.filter(function(w){return w.type==='transfer';}).length;
        var distBTC = whaleTxs.filter(function(w){return w.type==='dist';}).reduce(function(a,w){return a+w.btc;},0);
        var consolBTC = whaleTxs.filter(function(w){return w.type==='consol';}).reduce(function(a,w){return a+w.btc;},0);
        var transferBTC = whaleTxs.filter(function(w){return w.type==='transfer';}).reduce(function(a,w){return a+w.btc;},0);

            txs: whaleTxs.slice(0, 40),
            total: whaleTxs.length,
            totalBTC: totalBTC,
            distCount: distCount,
            consolCount: consolCount,
            transferCount: transferCount,
            distBTC: distBTC,
            consolBTC: consolBTC,
            transferBTC: transferBTC,
            megaWhales: mega.length,
            megaBTC: mega.reduce(function(a,w){return a+w.btc;},0),
            signal: distBTC > consolBTC * 1.5 ? 'bearish' : consolBTC > distBTC * 1.5 ? 'bullish' : 'neutral',
            lastUpdate: new Date().toLocaleTimeString()
        };
        renderApp();

        // Async entity lookup
        lookupEntities(state.whales.txs).then(function(){
            state.whales.txs.forEach(function(wtx){
                if (!wtx.from && wtx._fromAddr) wtx.from = identifyAddress(wtx._fromAddr);
                if (!wtx.to && wtx._toAddr) wtx.to = identifyAddress(wtx._toAddr);
            });
            renderApp();
        });
    }).catch(function(e){
        // Don't null out existing data — keep showing old data until new arrives
        if (!state.whales) state.whales = null;
    });
}

// === ORDER FLOW / VOLUME PROFILE ===

function loadOrderFlow() {
    fetchJSON(API.orderbook).then(function(data) {
        var result = data.result || {};
        var key = Object.keys(result)[0];
        if (!key) return;
        var bids = result[key].bids || [];
        var asks = result[key].asks || [];

        // Aggregate into $500 price buckets
        var buckets = {};
        var midPrice = bids.length > 0 ? parseFloat(bids[0][0]) : 0;

        bids.forEach(function(b) {
            var price = parseFloat(b[0]), qty = parseFloat(b[1]);
            var bucket = Math.round(price / 500) * 500;
            if (!buckets[bucket]) buckets[bucket] = {bid:0, ask:0};
            buckets[bucket].bid += qty;
        });
        asks.forEach(function(a) {
            var price = parseFloat(a[0]), qty = parseFloat(a[1]);
            var bucket = Math.round(price / 500) * 500;
            if (!buckets[bucket]) buckets[bucket] = {bid:0, ask:0};
            buckets[bucket].ask += qty;
        });

        // Sort by price and get nearby buckets
        var sortedBuckets = Object.keys(buckets).map(function(k){
            return {price: parseInt(k), bid: buckets[k].bid, ask: buckets[k].ask};
        }).filter(function(b){
            return Math.abs(b.price - midPrice) < midPrice * 0.03; // within 3%
        }).sort(function(a,b){ return b.price - a.price; });

        // Find biggest walls
        var bigBids = bids.map(function(b){return {price:parseFloat(b[0]), qty:parseFloat(b[1])};})
            .sort(function(a,b){return b.qty-a.qty;}).slice(0,5);
        var bigAsks = asks.map(function(a){return {price:parseFloat(a[0]), qty:parseFloat(a[1])};})
            .sort(function(a,b){return b.qty-a.qty;}).slice(0,5);

        // Bid/Ask ratio
        var totalBid = bids.reduce(function(a,b){return a+parseFloat(b[1]);},0);
        var totalAsk = asks.reduce(function(a,b){return a+parseFloat(b[1]);},0);
        var ratio = totalAsk > 0 ? totalBid / totalAsk : 1;

        state.orderflow = {
            buckets: sortedBuckets,
            bigBids: bigBids,
            bigAsks: bigAsks,
            totalBid: totalBid,
            totalAsk: totalAsk,
            ratio: ratio,
            midPrice: midPrice,
            signal: ratio > 1.3 ? 'bullish' : ratio < 0.8 ? 'bearish' : 'neutral',
            lastUpdate: new Date().toLocaleTimeString()
        };
        renderApp();
    }).catch(function(){ /* keep existing data */ });
}

// === INSTITUTIONAL HOLDINGS ===

function loadTreasuries() {
    fetchJSON(API.treasuries).then(function(data) {
        var companies = data.companies || [];
        var btcPrice = state.price || 67000;
        state.treasuries = companies.slice(0, 15).map(function(c) {
            var holdings = c.total_holdings || 0;
            var costBasis = c.total_entry_value_usd && holdings > 0 ? Math.round(c.total_entry_value_usd / holdings) : null;
            var pnlPct = costBasis && btcPrice ? ((btcPrice - costBasis) / costBasis) * 100 : null;
            return {
                name: c.name || 'Unknown',
                symbol: c.symbol || '',
                holdings: holdings,
                costBasis: costBasis,
                pnlPct: pnlPct,
                country: c.country || ''
            };
        });
        renderApp();
    }).catch(function() { /* keep existing data */ });
}

// === MACRO SIGNALS ===

function loadMacro() {
    fetchJSON('/api/macro').then(function(data) {
        state.macro = data;
        state.macro.lastUpdate = new Date().toLocaleTimeString();
        renderApp();
    }).catch(function(){});
}

// === DATA LOAD ===

function loadData() {
    // If time machine is on, fetch extra days to have data for "1 week ago" analysis + what happened after
    var fetchDays = state.timeMachine ? Math.max(30, parseInt(state.timeframe) + 14) : state.timeframe;

    Promise.allSettled([
        fetchJSON(API.price),
        fetchJSON(API.history(fetchDays)),
        fetchJSON(API.fearGreed),
        fetchJSON(API.global),
        fetchJSON(API.funding),
    ]).then(function(results){
        if(results[0].status==='fulfilled'){var b=results[0].value.bitcoin; state.price=b.usd; state.change24h=b.usd_24h_change||0;}

        var fullHistory = [], fullVolumes = [];
        if(results[1].status==='fulfilled'){
            fullHistory = results[1].value.prices.map(function(p){return p[1];});
            if(results[1].value.total_volumes) fullVolumes = results[1].value.total_volumes.map(function(p){return p[1];});
        }

        if(results[2].status==='fulfilled'&&results[2].value.data){state.fearGreed=parseInt(results[2].value.data[0].value);}
        if(results[3].status==='fulfilled'){state.btcDominance=results[3].value.data.market_cap_percentage.btc;}
        if(results[4].status==='fulfilled'&&results[4].value.length>0){state.fundingRate=parseFloat(results[4].value[0].fundingRate);}

        if (state.timeMachine && fullHistory.length > 50) {
            // For CoinGecko: 1 day = ~288 points (5min), 7 days = ~2016 points, 30 days = ~720 (hourly)
            // We'll slice off approximately the last 7 days worth of data
            var totalPts = fullHistory.length;
            // Estimate points per day
            var ptsPerDay = Math.round(totalPts / fetchDays);
            var cutoffPts = ptsPerDay * 7; // 7 days of data to slice off
            var sliceIdx = Math.max(20, totalPts - cutoffPts);

            // "1 week ago" data — what we would have analyzed
            var pastHistory = fullHistory.slice(0, sliceIdx);
            var pastVolumes = fullVolumes.slice(0, sliceIdx);
            // "What happened next" — the 7 days after
            var futureHistory = fullHistory.slice(sliceIdx);

            state.history = pastHistory;
            state.volumes = pastVolumes;

            var priceAtPrediction = pastHistory[pastHistory.length-1];
            var priceNow = fullHistory[fullHistory.length-1];
            var priceHigh = futureHistory.length > 0 ? Math.max.apply(null, futureHistory) : priceNow;
            var priceLow = futureHistory.length > 0 ? Math.min.apply(null, futureHistory) : priceNow;
            var actualChange = ((priceNow - priceAtPrediction) / priceAtPrediction) * 100;
            var maxUp = ((priceHigh - priceAtPrediction) / priceAtPrediction) * 100;
            var maxDown = ((priceLow - priceAtPrediction) / priceAtPrediction) * 100;

            // Run analysis on past data
            if(state.history.length>15){state.rsiSeries=calcRSISeries(state.history,14); state.currentRSI=state.rsiSeries.length>0?state.rsiSeries[state.rsiSeries.length-1]:null;}
            state.computed=computeAll(state.history, state.volumes, state.fearGreed, state.fundingRate, state.btcDominance);

            // Determine if prediction was correct
            var prediction = state.computed.action;
            var correct, verdictText;
            if (prediction === 'BUY' && actualChange > 1) { correct = 'correct'; verdictText = 'Signal said BUY — price went up '+actualChange.toFixed(1)+'%'; }
            else if (prediction === 'SELL' && actualChange < -1) { correct = 'correct'; verdictText = 'Signal said SELL — price went down '+Math.abs(actualChange).toFixed(1)+'%'; }
            else if (prediction === 'HOLD' && Math.abs(actualChange) < 3) { correct = 'correct'; verdictText = 'Signal said HOLD — price moved only '+actualChange.toFixed(1)+'%'; }
            else if (prediction === 'BUY' && actualChange < -3) { correct = 'wrong'; verdictText = 'Signal said BUY — but price dropped '+Math.abs(actualChange).toFixed(1)+'%'; }
            else if (prediction === 'SELL' && actualChange > 3) { correct = 'wrong'; verdictText = 'Signal said SELL — but price rallied '+actualChange.toFixed(1)+'%'; }
            else { correct = 'partial'; verdictText = 'Signal said '+prediction+' — price moved '+actualChange.toFixed(1)+'% (borderline)'; }

            state.tmResult = {
                priceAtPrediction: priceAtPrediction,
                priceNow: priceNow,
                actualChange: actualChange,
                maxUp: maxUp,
                maxDown: maxDown,
                prediction: prediction,
                correct: correct,
                verdictText: verdictText,
                futureHistory: futureHistory
            };
            state.price = priceAtPrediction;

        } else {
            state.history = fullHistory;
            state.volumes = fullVolumes;
            state.tmResult = null;
            if(state.history.length>15){state.rsiSeries=calcRSISeries(state.history,14); state.currentRSI=state.rsiSeries.length>0?state.rsiSeries[state.rsiSeries.length-1]:null;}
            state.computed=computeAll(state.history, state.volumes, state.fearGreed, state.fundingRate, state.btcDominance);
        }

        state.lastUpdate = new Date().toLocaleTimeString();
        renderApp();
    }).catch(function(err){
        // Only show error if we have NO data yet. Otherwise keep showing existing data.
        if (!state.computed) {
            document.getElementById('app').innerHTML='<div class="error-msg">Failed to load: '+err.message+'</div><div class="actions"><button class="refresh-btn" onclick="loadData()">Retry</button></div>';
        }
    });
}

loadData();
loadWhales();
loadTreasuries();
loadOrderFlow();
loadMacro();
setInterval(loadData, 60000);
setInterval(loadWhales, 300000);
setInterval(loadTreasuries, 300000);
setInterval(loadOrderFlow, 30000);
setInterval(loadMacro, 300000);
</script>
